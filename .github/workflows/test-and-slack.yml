name: Maven Test + Slack Report

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B clean test

      - name: Archive Surefire + Extent reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/extent-reports/**
          if-no-files-found: warn

      - name: Find latest Extent HTML report
        if: always()
        id: extent_report
        shell: bash
        run: |
          REPORT_FILE="$(ls -1t target/extent-reports/*.html 2>/dev/null | head -n 1 || true)"

          if [ -n "$REPORT_FILE" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"
            echo "report_name=$(basename "$REPORT_FILE")" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Slack message
        if: always()
        id: slack_message
        shell: bash
        run: |
          STATUS="${{ job.status }}"
          REPO="${{ github.repository }}"
          REF="${{ github.ref_name }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            TEXT="Tests passed"
          else
            EMOJI=":x:"
            TEXT="Tests failed"
          fi

          if [ "${{ steps.extent_report.outputs.found }}" = "true" ]; then
            REPORT_NOTE="Extent HTML report generated and upload attempted to Slack."
          else
            REPORT_NOTE="No Extent HTML report was found."
          fi

          echo "payload<<EOF" >> "$GITHUB_OUTPUT"
          cat <<JSON >> "$GITHUB_OUTPUT"
          {
            "text": "${EMOJI} ${TEXT} for *${REPO}* on branch *${REF}*\nRun: ${RUN_URL}\n${REPORT_NOTE}"
          }
          JSON
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: ${{ steps.slack_message.outputs.payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Upload Extent HTML report to Slack
        if: always() && steps.extent_report.outputs.found == 'true'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          method: files.uploadV2
          payload: |
            {
              "channel_id": "${{ secrets.SLACK_CHANNEL_ID }}",
              "initial_comment": "Extent HTML report for ${{ github.repository }} on ${{ github.ref_name }}",
              "file": "${{ steps.extent_report.outputs.report_file }}",
              "filename": "${{ steps.extent_report.outputs.report_name }}",
              "title": "Extent Test Report"
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
