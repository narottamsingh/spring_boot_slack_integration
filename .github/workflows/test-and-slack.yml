name: Maven Test + Slack Report

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B clean test

      - name: Archive Surefire + Extent reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/extent-reports/**
          if-no-files-found: warn

      - name: Parse test results
        if: always()
        id: parse_results
        shell: bash
        run: |
          REPORT_FILE="target/surefire-reports/TEST-*.xml"
          TOTAL_TESTS=0
          PASSED_TESTS=0
          FAILED_TESTS=0
          SKIPPED_TESTS=0
          TEST_DETAILS=""
          PASSED_TEST_NAMES=""
          FAILED_TEST_NAMES=""
          SKIPPED_TEST_NAMES=""

          # Parse XML reports
          for file in $REPORT_FILE; do
            if [ -f "$file" ]; then
              # Extract summary metrics
              TESTS=$(grep -oP 'tests="\K[^"]+' "$file" | head -1)
              FAILURES=$(grep -oP 'failures="\K[^"]+' "$file" | head -1)
              SKIPPED=$(grep -oP 'skipped="\K[^"]+' "$file" | head -1)

              TOTAL_TESTS=$((TOTAL_TESTS + ${TESTS:-0}))
              FAILED_TESTS=$((FAILED_TESTS + ${FAILURES:-0}))
              SKIPPED_TESTS=$((SKIPPED_TESTS + ${SKIPPED:-0}))
              PASSED_TESTS=$((TOTAL_TESTS - FAILED_TESTS - SKIPPED_TESTS))

              # Extract all test case names and their status
              while IFS= read -r line; do
                if [[ $line == *"<testcase"* ]]; then
                  TEST_NAME=$(echo "$line" | grep -oP 'name="\K[^"]+')
                  TEST_CLASS=$(echo "$line" | grep -oP 'classname="\K[^"]+')
                  
                  # Check if test has failure or error
                  if grep -A 5 "name=\"$TEST_NAME\"" "$file" | grep -q "<failure\|<error"; then
                    ERROR_MSG=$(grep -A 2 "name=\"$TEST_NAME\"" "$file" | grep -oP '<failure[^>]*message="\K[^"]+|<error[^>]*message="\K[^"]+' | head -1)
                    FAILED_TEST_NAMES="${FAILED_TEST_NAMES}❌ ${TEST_CLASS}.${TEST_NAME}\n   Error: ${ERROR_MSG}\n"
                    TEST_DETAILS="${TEST_DETAILS}\n❌ ${TEST_NAME}: ${ERROR_MSG}"
                  # Check if test is skipped
                  elif grep -A 2 "name=\"$TEST_NAME\"" "$file" | grep -q "<skipped"; then
                    SKIPPED_TEST_NAMES="${SKIPPED_TEST_NAMES}⏭️ ${TEST_CLASS}.${TEST_NAME}\n"
                  # Otherwise it passed
                  else
                    PASSED_TEST_NAMES="${PASSED_TEST_NAMES}✅ ${TEST_CLASS}.${TEST_NAME}\n"
                  fi
                fi
              done < "$file"
            fi
          done

          # Output results
          echo "total_tests=$TOTAL_TESTS" >> "$GITHUB_OUTPUT"
          echo "passed_tests=$PASSED_TESTS" >> "$GITHUB_OUTPUT"
          echo "failed_tests=$FAILED_TESTS" >> "$GITHUB_OUTPUT"
          echo "skipped_tests=$SKIPPED_TESTS" >> "$GITHUB_OUTPUT"
          echo "test_details<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$TEST_DETAILS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "passed_test_names<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$PASSED_TEST_NAMES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "failed_test_names<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$FAILED_TEST_NAMES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "skipped_test_names<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$SKIPPED_TEST_NAMES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build Slack message
        if: always()
        id: slack_message
        shell: bash
        run: |
          STATUS="${{ job.status }}"
          REPO="${{ github.repository }}"
          REF="${{ github.ref_name }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          TOTAL="${{ steps.parse_results.outputs.total_tests }}"
          PASSED="${{ steps.parse_results.outputs.passed_tests }}"
          FAILED="${{ steps.parse_results.outputs.failed_tests }}"
          SKIPPED="${{ steps.parse_results.outputs.skipped_tests }}"
          PASSED_NAMES="${{ steps.parse_results.outputs.passed_test_names }}"
          FAILED_NAMES="${{ steps.parse_results.outputs.failed_test_names }}"
          SKIPPED_NAMES="${{ steps.parse_results.outputs.skipped_test_names }}"
          TEST_DETAILS="${{ steps.parse_results.outputs.test_details }}"

          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            COLOR="#36a64f"
            STATUS_TEXT="Tests Passed"
          else
            EMOJI="❌"
            COLOR="#ff0000"
            STATUS_TEXT="Tests Failed"
          fi

          # Escape special characters for JSON
          REPO=$(echo "$REPO" | sed 's/\\/\\\\/g; s/"/\\"/g')
          REF=$(echo "$REF" | sed 's/\\/\\\\/g; s/"/\\"/g')
          RUN_URL=$(echo "$RUN_URL" | sed 's/\\/\\\\/g; s/"/\\"/g')
          PASSED_NAMES=$(echo "$PASSED_NAMES" | sed 's/\\/\\\\/g; s/"/\\"/g')
          FAILED_NAMES=$(echo "$FAILED_NAMES" | sed 's/\\/\\\\/g; s/"/\\"/g')
          SKIPPED_NAMES=$(echo "$SKIPPED_NAMES" | sed 's/\\/\\\\/g; s/"/\\"/g')
          TEST_DETAILS=$(echo "$TEST_DETAILS" | sed 's/\\/\\\\/g; s/"/\\"/g')

          # Truncate test details if too long for Slack
          if [ ${#PASSED_NAMES} -gt 300 ]; then
            PASSED_NAMES="${PASSED_NAMES:0:300}...\n_See full report in artifacts_"
          fi
          if [ ${#FAILED_NAMES} -gt 300 ]; then
            FAILED_NAMES="${FAILED_NAMES:0:300}...\n_See full report in artifacts_"
          fi
          if [ ${#SKIPPED_NAMES} -gt 300 ]; then
            SKIPPED_NAMES="${SKIPPED_NAMES:0:300}...\n_See full report in artifacts_"
          fi

          PAYLOAD=$(cat <<'JSON'
          {
            "attachments": [
              {
                "color": "COLOR_PLACEHOLDER",
                "title": "EMOJI_PLACEHOLDER Test Report - REPO_PLACEHOLDER",
                "title_link": "RUN_URL_PLACEHOLDER",
                "fields": [
                  {
                    "title": "Branch",
                    "value": "REF_PLACEHOLDER",
                    "short": true
                  },
                  {
                    "title": "Status",
                    "value": "STATUS_PLACEHOLDER",
                    "short": true
                  },
                  {
                    "title": "Total Tests",
                    "value": "TOTAL_PLACEHOLDER",
                    "short": true
                  },
                  {
                    "title": "Passed",
                    "value": "PASSED_PLACEHOLDER ✅",
                    "short": true
                  },
                  {
                    "title": "Failed",
                    "value": "FAILED_PLACEHOLDER ❌",
                    "short": true
                  },
                  {
                    "title": "Skipped",
                    "value": "SKIPPED_PLACEHOLDER ⏭️",
                    "short": true
                  },
                  {
                    "title": "Passed Tests",
                    "value": "PASSED_NAMES_PLACEHOLDER",
                    "short": false
                  },
                  {
                    "title": "Failed Tests",
                    "value": "FAILED_NAMES_PLACEHOLDER",
                    "short": false
                  },
                  {
                    "title": "Skipped Tests",
                    "value": "SKIPPED_NAMES_PLACEHOLDER",
                    "short": false
                  }
                ],
                "footer": "GitHub Actions",
                "ts": $(date +%s)
              }
            ]
          }
          JSON
          )
          
          PAYLOAD="${PAYLOAD//COLOR_PLACEHOLDER/$COLOR}"
          PAYLOAD="${PAYLOAD//EMOJI_PLACEHOLDER/$EMOJI}"
          PAYLOAD="${PAYLOAD//REPO_PLACEHOLDER/$REPO}"
          PAYLOAD="${PAYLOAD//RUN_URL_PLACEHOLDER/$RUN_URL}"
          PAYLOAD="${PAYLOAD//REF_PLACEHOLDER/$REF}"
          PAYLOAD="${PAYLOAD//STATUS_PLACEHOLDER/$STATUS_TEXT}"
          PAYLOAD="${PAYLOAD//TOTAL_PLACEHOLDER/$TOTAL}"
          PAYLOAD="${PAYLOAD//PASSED_PLACEHOLDER/$PASSED}"
          PAYLOAD="${PAYLOAD//FAILED_PLACEHOLDER/$FAILED}"
          PAYLOAD="${PAYLOAD//SKIPPED_PLACEHOLDER/$SKIPPED}"
          PAYLOAD="${PAYLOAD//PASSED_NAMES_PLACEHOLDER/$PASSED_NAMES}"
          PAYLOAD="${PAYLOAD//FAILED_NAMES_PLACEHOLDER/$FAILED_NAMES}"
          PAYLOAD="${PAYLOAD//SKIPPED_NAMES_PLACEHOLDER/$SKIPPED_NAMES}"

          echo "final_payload<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: ${{ steps.slack_message.outputs.final_payload }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
